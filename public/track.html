<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الدفع</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #0f0e17; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 520px; padding: 24px; margin: 0 auto; }

    /* Status header */
    .status-header { text-align: center; padding: 40px 24px 32px; border-radius: 24px 24px 0 0; }
    .status-header.pending { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .status-header.paid { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .status-header.failed { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .status-header.cancelled { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }
    .status-icon { font-size: 56px; margin-bottom: 16px; }
    .status-text { font-size: 22px; font-weight: 700; color: #fff; }
    .status-sub { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 8px; }

    /* Loading dots */
    .dots { display: inline-flex; gap: 6px; margin-top: 16px; }
    .dots span { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.7); animation: dotPulse 1.4s infinite ease-in-out; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* Card */
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 24px 24px; padding: 0; overflow: hidden; }

    /* Timer */
    .timer-bar { background: rgba(255,255,255,0.04); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .timer-bar .label { font-size: 13px; color: rgba(255,255,255,0.5); }
    .timer-bar .time { font-size: 15px; font-weight: 600; color: #f39c12; font-variant-numeric: tabular-nums; direction: ltr; }

    /* Details */
    .details { padding: 24px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .key { font-size: 14px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 8px; }
    .detail-row .val { font-size: 14px; color: #fff; font-weight: 600; max-width: 60%; text-align: left; word-break: break-word; }
    .detail-row .val.price { font-size: 20px; color: #667eea; }

    /* Link copy */
    .link-section { padding: 0 24px 24px; }
    .link-box { display: flex; gap: 8px; }
    .link-input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: rgba(255,255,255,0.7); font-size: 12px; outline: none; direction: ltr; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-copy { padding: 10px 18px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.3s; }
    .btn-copy:hover { transform: translateY(-1px); }
    .btn-copy.copied { background: linear-gradient(135deg, #2ecc71, #27ae60); }

    /* Actions */
    .actions { padding: 0 24px 28px; display: flex; flex-direction: column; gap: 10px; }
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; text-decoration: none; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .btn-cancel { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
    .btn-back { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

    /* Success animation */
    @keyframes successPop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    .success-anim { animation: successPop 0.5s ease-out; }

    .hidden { display: none; }

    @media (max-width: 480px) { .container { padding: 12px; } .status-header { padding: 32px 16px 24px; } .details { padding: 16px; } .link-section, .actions { padding: 0 16px 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <!-- Status Header -->
    <div class="status-header pending" id="statusHeader">
      <div class="status-icon" id="statusIcon">⏳</div>
      <div class="status-text" id="statusText">في انتظار الدفع...</div>
      <div class="status-sub" id="statusSub">يرجى الانتظار حتى يكمل العميل عملية الدفع</div>
      <div class="dots" id="loadingDots"><span></span><span></span><span></span></div>
    </div>

    <!-- Card -->
    <div class="card">
      <!-- Timer -->
      <div class="timer-bar" id="timerBar">
        <span class="label">⏱️ الوقت المنقضي</span>
        <span class="time" id="elapsed">00:00:00</span>
      </div>

      <!-- Details -->
      <div class="details">
        <div class="detail-row">
          <span class="key">👤 العميل</span>
          <span class="val" id="dName">—</span>
        </div>
        <div class="detail-row">
          <span class="key">📧 البريد</span>
          <span class="val" id="dEmail" dir="ltr">—</span>
        </div>
        <div class="detail-row">
          <span class="key">🛍️ المنتج</span>
          <span class="val" id="dProduct">—</span>
        </div>
        <div class="detail-row">
          <span class="key">💰 المبلغ</span>
          <span class="val price" id="dPrice">—</span>
        </div>
        <div class="detail-row">
          <span class="key">📅 تاريخ الإنشاء</span>
          <span class="val" id="dDate">—</span>
        </div>
      </div>

      <!-- Link copy -->
      <div class="link-section">
        <div class="link-box">
          <input type="text" class="link-input" id="linkInput" readonly>
          <button class="btn-copy" id="btnCopy" onclick="copyLink()">📋 نسخ</button>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions" id="actionButtons">
        <button class="btn btn-cancel" id="btnCancel" onclick="cancelPayment()">❌ إلغاء الطلب</button>
        <button class="btn btn-back" onclick="goBack()">🔙 العودة للوحة التحكم</button>
      </div>
    </div>
  </div>

  <script>
    const paymentId = window.location.pathname.split('/track/')[1];
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user) window.location.href = '/login';

    function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    let createdAt = null;
    let timerInterval = null;
    let pollInterval = null;
    let currentStatus = 'pending';

    // Timer
    function startTimer() {
      if (timerInterval) return;
      timerInterval = setInterval(updateTimer, 1000);
    }
    function updateTimer() {
      if (!createdAt) return;
      const diff = Math.floor((Date.now() - new Date(createdAt).getTime()) / 1000);
      const h = String(Math.floor(diff / 3600)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      document.getElementById('elapsed').textContent = `${h}:${m}:${s}`;
    }

    // Status update
    function updateStatus(status) {
      currentStatus = status;
      const header = document.getElementById('statusHeader');
      const icon = document.getElementById('statusIcon');
      const text = document.getElementById('statusText');
      const sub = document.getElementById('statusSub');
      const dots = document.getElementById('loadingDots');
      const cancelBtn = document.getElementById('btnCancel');

      header.className = 'status-header ' + status;
      dots.classList.add('hidden');

      if (status === 'pending') {
        icon.textContent = '⏳';
        text.textContent = 'في انتظار الدفع...';
        sub.textContent = 'يرجى الانتظار حتى يكمل العميل عملية الدفع';
        dots.classList.remove('hidden');
        cancelBtn.classList.remove('hidden');
      } else if (status === 'paid') {
        icon.textContent = '✅';
        icon.classList.add('success-anim');
        text.textContent = 'تم الدفع بنجاح!';
        sub.textContent = 'أكمل العميل عملية الدفع';
        cancelBtn.classList.add('hidden');
        document.getElementById('timerBar').querySelector('.time').style.color = '#2ecc71';
        stopPolling();
        // Play a subtle notification sound
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 800; gain.gain.value = 0.15;
          osc.start(); osc.stop(ctx.currentTime + 0.15);
          setTimeout(() => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); o2.frequency.value = 1200; g2.gain.value = 0.15; o2.start(); o2.stop(ctx.currentTime + 0.2); }, 180);
        } catch(e) {}
      } else if (status === 'failed') {
        icon.textContent = '❌';
        text.textContent = 'فشلت عملية الدفع';
        sub.textContent = 'لم تتم عملية الدفع — يمكنك إعادة المحاولة';
        cancelBtn.classList.add('hidden');
        stopPolling();
      } else if (status === 'cancelled') {
        icon.textContent = '🚫';
        text.textContent = 'تم إلغاء الطلب';
        sub.textContent = 'تم إلغاء رابط الدفع';
        cancelBtn.classList.add('hidden');
        stopPolling();
      }
    }

    // Load payment data
    async function loadPayment() {
      try {
        const res = await fetch(`/api/track/${paymentId}`, { headers: authHeaders() });
        if (res.status === 401) { window.location.href = '/login'; return; }
        if (!res.ok) { document.getElementById('statusText').textContent = 'الدفعة غير موجودة'; return; }
        const data = await res.json();

        document.getElementById('dName').textContent = data.customerName || '—';
        document.getElementById('dEmail').textContent = data.customerEmail || '—';
        document.getElementById('dProduct').textContent = data.productName || '—';
        document.getElementById('dPrice').textContent = Number(data.price).toFixed(2) + ' ر.س';
        document.getElementById('dDate').textContent = new Date(data.createdAt).toLocaleString('ar-SA');

        const baseUrl = window.location.origin;
        document.getElementById('linkInput').value = `${baseUrl}/pay/${paymentId}`;

        createdAt = data.createdAt;
        updateTimer();
        startTimer();

        if (data.status !== currentStatus) {
          updateStatus(data.status);
        }
      } catch (e) { console.error(e); }
    }

    // Polling every 5 seconds
    function startPolling() {
      loadPayment();
      pollInterval = setInterval(loadPayment, 5000);
    }
    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // Copy link
    function copyLink() {
      const input = document.getElementById('linkInput');
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = '✅ تم النسخ';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 نسخ'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // Cancel payment
    async function cancelPayment() {
      if (!confirm('هل تريد إلغاء هذا الطلب؟ لن يتمكن العميل من الدفع.')) return;
      try {
        const res = await fetch(`/api/payment/${paymentId}/cancel`, {
          method: 'POST',
          headers: authHeaders(),
        });
        if (res.ok) {
          updateStatus('cancelled');
        } else {
          const d = await res.json();
          alert(d.error || 'خطأ');
        }
      } catch (e) { alert('خطأ في الاتصال'); }
    }

    // Go back
    function goBack() {
      if (user.role === 'admin') window.location.href = '/admin';
      else window.location.href = '/merchant';
    }

    startPolling();
  </script>
</body>
</html>
