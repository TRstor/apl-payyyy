<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الدفع</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .container {
      width: 100%; max-width: 440px; margin: 0 auto;
      background: rgba(255,255,255,0.07); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Status */
    .status-area { text-align: center; padding: 32px 20px 24px; position: relative; }
    .status-area.pending { background: linear-gradient(135deg, rgba(243,156,18,0.15), rgba(230,126,34,0.08)); }
    .status-area.paid { background: linear-gradient(135deg, rgba(46,204,113,0.15), rgba(39,174,96,0.08)); }
    .status-area.failed { background: linear-gradient(135deg, rgba(231,76,60,0.15), rgba(192,57,43,0.08)); }
    .status-area.cancelled { background: linear-gradient(135deg, rgba(149,165,166,0.15), rgba(127,140,141,0.08)); }
    .status-ring { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 32px; }
    .pending .status-ring { background: rgba(243,156,18,0.15); border: 2px solid #f39c12; }
    .paid .status-ring { background: rgba(46,204,113,0.15); border: 2px solid #2ecc71; }
    .failed .status-ring { background: rgba(231,76,60,0.15); border: 2px solid #e74c3c; }
    .cancelled .status-ring { background: rgba(149,165,166,0.15); border: 2px solid #95a5a6; }
    .status-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .status-desc { font-size: 13px; color: rgba(255,255,255,0.6); }
    .dots { display: inline-flex; gap: 5px; margin-top: 12px; }
    .dots span { width: 8px; height: 8px; border-radius: 50%; background: #f39c12; animation: pulse 1.4s infinite ease-in-out; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
    @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .pop { animation: popIn 0.4s ease-out; }

    /* Timer */
    .timer { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .timer .lbl { font-size: 12px; color: rgba(255,255,255,0.4); }
    .timer .val { font-size: 14px; font-weight: 700; color: #f39c12; direction: ltr; font-variant-numeric: tabular-nums; }

    /* Info rows */
    .info { padding: 16px 20px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .row:last-child { border-bottom: none; }
    .row .k { font-size: 13px; color: rgba(255,255,255,0.45); }
    .row .v { font-size: 13px; color: #fff; font-weight: 600; max-width: 55%; text-align: left; word-break: break-word; }
    .row .v.big { font-size: 22px; color: #667eea; }

    /* Link */
    .link-area { padding: 0 20px 16px; }
    .link-row { display: flex; gap: 8px; }
    .link-input { flex: 1; padding: 9px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 11px; outline: none; direction: ltr; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-copy { padding: 9px 14px; background: #667eea; border: none; border-radius: 8px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-copy.ok { background: #2ecc71; }

    /* Buttons */
    .btns { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
    .b { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
    .b:active { transform: scale(0.98); }
    .b-cancel { background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.25); color: #e74c3c; }
    .b-back { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-area pending" id="statusArea">
      <div class="status-ring" id="statusRing">⏳</div>
      <div class="status-title" id="statusTitle">في انتظار الدفع</div>
      <div class="status-desc" id="statusDesc">يرجى الانتظار حتى يكمل العميل الدفع</div>
      <div class="dots" id="dots"><span></span><span></span><span></span></div>
    </div>
    <div class="timer" id="timerBar">
      <span class="lbl">⏱️ الوقت المنقضي</span>
      <span class="val" id="elapsed">00:00:00</span>
    </div>
    <div class="info">
      <div class="row"><span class="k">👤 العميل</span><span class="v" id="dName">—</span></div>
      <div class="row"><span class="k">📧 البريد</span><span class="v" id="dEmail" dir="ltr">—</span></div>
      <div class="row"><span class="k">🛍️ المنتج</span><span class="v" id="dProduct">—</span></div>
      <div class="row"><span class="k">📅 التاريخ</span><span class="v" id="dDate">—</span></div>
      <div class="row"><span class="k">💰 المبلغ</span><span class="v big" id="dPrice">—</span></div>
    </div>
    <div class="link-area">
      <div class="link-row">
        <input type="text" class="link-input" id="linkInput" readonly>
        <button class="btn-copy" id="btnCopy" onclick="copyLink()">📋 نسخ</button>
      </div>
    </div>
    <div class="btns" id="actionBtns">
      <button class="b b-cancel" id="btnCancel" onclick="cancelPayment()">❌ إلغاء الطلب</button>
      <button class="b b-back" onclick="goBack()">🔙 العودة للوحة التحكم</button>
    </div>
  </div>

  <script>
    const paymentId = window.location.pathname.split('/track/')[1];
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user) window.location.href = '/login';
    function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

    let createdAt = null, timerInt = null, pollInt = null, curStatus = 'pending';

    function startTimer() { if (!timerInt) timerInt = setInterval(updateTimer, 1000); }
    function updateTimer() {
      if (!createdAt) return;
      const d = Math.floor((Date.now() - new Date(createdAt).getTime()) / 1000);
      const h = String(Math.floor(d/3600)).padStart(2,'0');
      const m = String(Math.floor((d%3600)/60)).padStart(2,'0');
      const s = String(d%60).padStart(2,'0');
      document.getElementById('elapsed').textContent = `${h}:${m}:${s}`;
    }

    function setStatus(st) {
      curStatus = st;
      const area = document.getElementById('statusArea');
      const ring = document.getElementById('statusRing');
      const title = document.getElementById('statusTitle');
      const desc = document.getElementById('statusDesc');
      const dots = document.getElementById('dots');
      const cancel = document.getElementById('btnCancel');
      area.className = 'status-area ' + st;
      dots.classList.add('hidden');
      if (st === 'pending') {
        ring.textContent = '⏳'; title.textContent = 'في انتظار الدفع';
        desc.textContent = 'يرجى الانتظار حتى يكمل العميل الدفع';
        dots.classList.remove('hidden'); cancel.classList.remove('hidden');
      } else if (st === 'paid') {
        ring.textContent = '✅'; ring.classList.add('pop');
        title.textContent = 'تم الدفع بنجاح!'; desc.textContent = 'أكمل العميل عملية الدفع';
        cancel.classList.add('hidden');
        document.getElementById('elapsed').style.color = '#2ecc71';
        stopPoll(); playSound();
      } else if (st === 'failed') {
        ring.textContent = '❌'; title.textContent = 'فشلت عملية الدفع';
        desc.textContent = 'لم تتم عملية الدفع'; cancel.classList.add('hidden'); stopPoll();
      } else if (st === 'cancelled') {
        ring.textContent = '🚫'; title.textContent = 'تم إلغاء الطلب';
        desc.textContent = 'تم إلغاء رابط الدفع'; cancel.classList.add('hidden'); stopPoll();
      }
    }

    function playSound() {
      try {
        const c = new (window.AudioContext || window.webkitAudioContext)();
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = 800; g.gain.value = 0.12; o.start(); o.stop(c.currentTime + 0.12);
        setTimeout(() => { const o2 = c.createOscillator(), g2 = c.createGain(); o2.connect(g2); g2.connect(c.destination); o2.frequency.value = 1200; g2.gain.value = 0.12; o2.start(); o2.stop(c.currentTime + 0.18); }, 150);
      } catch(e) {}
    }

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    async function load() {
      try {
        const res = await fetch(`/api/track/${paymentId}`, { headers: authHeaders() });
        if (res.status === 401) { window.location.href = '/login'; return; }
        if (!res.ok) { document.getElementById('statusTitle').textContent = 'غير موجود'; return; }
        const d = await res.json();
        document.getElementById('dName').textContent = d.customerName || '—';
        document.getElementById('dEmail').textContent = d.customerEmail || '—';
        document.getElementById('dProduct').textContent = d.productName || '—';
        document.getElementById('dPrice').textContent = Number(d.price).toFixed(2) + ' ر.س';
        document.getElementById('dDate').textContent = new Date(d.createdAt).toLocaleString('ar-SA');
        document.getElementById('linkInput').value = location.origin + '/pay/' + paymentId;
        createdAt = d.createdAt; updateTimer(); startTimer();
        if (d.status !== curStatus) setStatus(d.status);
      } catch(e) { console.error(e); }
    }

    function startPoll() { load(); pollInt = setInterval(load, 5000); }
    function stopPoll() { if (pollInt) { clearInterval(pollInt); pollInt = null; } }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('linkInput').value).then(() => {
        const b = document.getElementById('btnCopy');
        b.textContent = '✅ تم'; b.classList.add('ok');
        setTimeout(() => { b.textContent = '📋 نسخ'; b.classList.remove('ok'); }, 2000);
      });
    }

    async function cancelPayment() {
      if (!confirm('هل تريد إلغاء هذا الطلب؟')) return;
      try {
        const r = await fetch(`/api/payment/${paymentId}/cancel`, { method: 'POST', headers: authHeaders() });
        if (r.ok) setStatus('cancelled');
        else { const d = await r.json(); alert(d.error || 'خطأ'); }
      } catch(e) { alert('خطأ في الاتصال'); }
    }

    function goBack() { window.location.href = user.role === 'admin' ? '/admin' : '/merchant'; }
    startPoll();
  </script>
</body>
</html>
