<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
    }
    .logo h1 {
      font-size: 26px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 6px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: rgba(255,255,255,0.8); }
    input, select {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff; font-size: 15px;
      outline: none; transition: all 0.3s;
    }
    input::placeholder { color: rgba(255,255,255,0.35); }
    input:focus, select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.25);
    }
    select { cursor: pointer; }
    select option { background: #1a1a2e; color: #fff; }
    button {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; margin-top: 8px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }
    .alert {
      padding: 12px 16px; border-radius: 10px; margin-top: 16px; font-size: 14px; display: none;
      background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c;
    }
    .alert.show { display: block; }
    @media (max-width: 480px) { .container { margin: 16px; padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">💳</div>
      <h1>APL Pay</h1>
      <p>نظام إدارة روابط الدفع</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" dir="ltr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" dir="ltr" required autocomplete="current-password">
      </div>
      <button type="submit">تسجيل الدخول</button>
    </form>

    <div id="alert" class="alert"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alert = document.getElementById('alert');
      alert.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          if (data.user.role === 'admin') {
            window.location.href = '/admin';
          } else {
            window.location.href = '/merchant';
          }
        } else {
          alert.textContent = data.error || 'بيانات الدخول غير صحيحة';
          alert.classList.add('show');
        }
      } catch (err) {
        alert.textContent = 'خطأ في الاتصال بالخادم';
        alert.classList.add('show');
      }
    });

    // If already logged in, redirect
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (token && user) {
      window.location.href = user.role === 'admin' ? '/admin' : '/merchant';
    }
  </script>
</body>
</html>
